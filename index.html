<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">

<title>Boutique Fashion</title><style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;

min-height:100vh;

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

.overlay{
